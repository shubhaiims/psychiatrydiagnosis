<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ICD-11 Psychiatry Diagnostic Interview</title>
    <meta
      name="description"
      content="Structured psychiatric clinical interview support tool for clinicians."
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <img src="assets/diagnostic-flow.svg" alt="" class="brand-mark">
        <div>
          <p class="eyebrow">ICD-11 CDDR adapted</p>
          <h1>Psychiatry Diagnostic Interview</h1>
        </div>
      </div>
      <div class="topbar-actions" aria-label="Interview actions">
        <button class="ghost-button" id="copyReport" title="Copy summary">
          Copy
        </button>
        <button class="ghost-button" id="printReport" title="Print summary">
          Print
        </button>
        <button class="danger-button" id="resetInterview" title="Clear saved responses">
          Reset
        </button>
      </div>
    </header>

    <main class="app-shell">
      <aside class="left-panel" aria-label="Interview navigation">
        <label class="field-label" for="interviewSelect">Interview package</label>
        <select id="interviewSelect" class="module-select"></select>

        <div class="progress-block" aria-label="Completion">
          <div class="progress-meta">
            <span id="progressText">0 of 0</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>

        <nav class="stage-list" id="stageList" aria-label="Interview stages"></nav>
      </aside>

      <section class="interview-panel" aria-label="Current question">
        <div class="section-tabs" role="tablist" aria-label="Views">
          <button class="tab-button is-active" data-tab="interview" role="tab">
            Interview
          </button>
          <button class="tab-button" data-tab="findings" role="tab">
            Findings
          </button>
          <button class="tab-button" data-tab="data" role="tab">
            Data
          </button>
        </div>

        <div id="interviewView" class="view-panel is-active"></div>
        <div id="findingsView" class="view-panel"></div>
        <div id="dataView" class="view-panel"></div>
      </section>

      <aside class="right-panel" aria-label="Clinical state">
        <section class="status-section">
          <h2>Safety</h2>
          <div id="safetyFlags" class="stack-list"></div>
        </section>

        <section class="status-section">
          <h2>Diagnostic Review</h2>
          <div id="ruleSignals" class="stack-list"></div>
        </section>

        <section class="status-section">
          <h2>Score Domains</h2>
          <div id="scoreDomains" class="score-grid"></div>
        </section>
      </aside>
    </main>

    <footer class="footer-note">
      <strong>Clinical use:</strong> ICD-11 CDDR-adapted, non-commercial clinical support;
      not an official WHO, DSM, or SCID instrument and not a substitute for clinician judgment.
    </footer>

    <script src="app.js" defer></script>
  </body>
</html>
